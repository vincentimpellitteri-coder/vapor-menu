<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Stock Manager — The Vapor Place</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; overflow: hidden; }

    #pw-screen {
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    #pw-box {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 40px 32px; width: 320px; text-align: center;
    }
    #pw-box h2 {
      font-size: 0.8rem; letter-spacing: 0.15em; color: #00e5ff;
      text-transform: uppercase; margin-bottom: 24px; font-family: monospace;
    }
    #pw-input {
      width: 100%; background: #111; border: 1px solid #333; border-radius: 7px;
      color: #f0f0f0; padding: 12px 14px; font-size: 1rem; outline: none;
      margin-bottom: 12px; text-align: center; letter-spacing: 0.1em;
    }
    #pw-input:focus { border-color: #00e5ff55; }
    #pw-btn {
      width: 100%; padding: 12px; background: #00e5ff; color: #111;
      border: none; border-radius: 7px; font-size: 0.75rem; letter-spacing: 0.1em;
      font-weight: 700; cursor: pointer; text-transform: uppercase;
    }
    #pw-btn:hover { background: #00c8e0; }
    #pw-error { color: #f87171; font-size: 0.8rem; margin-top: 10px; min-height: 18px; }

    #admin-screen { display: none; height: 100vh; flex-direction: column; }
    #admin-screen.visible { display: flex; }

    #top-bar {
      background: #111; border-bottom: 1px solid #222;
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; gap: 16px; flex-wrap: wrap;
    }
    #top-bar h1 {
      font-size: 0.75rem; letter-spacing: 0.15em; color: #00e5ff;
      text-transform: uppercase; font-family: monospace; white-space: nowrap;
    }
    #search-bar {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 7px;
      color: #f0f0f0; padding: 8px 12px; font-size: 0.85rem; outline: none; width: 220px;
    }
    #search-bar:focus { border-color: #00e5ff44; }
    #stats { font-size: 0.75rem; color: #555; white-space: nowrap; }
    #stats span { color: #00e5ff; }
    #exit-btn {
      background: none; border: 1px solid #333; border-radius: 6px;
      color: #888; padding: 7px 16px; font-size: 0.7rem; letter-spacing: 0.08em;
      cursor: pointer; text-transform: uppercase; white-space: nowrap;
    }
    #exit-btn:hover { color: #f0f0f0; border-color: #666; }

    #list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 20px 60px; }
    #list-wrap::-webkit-scrollbar { width: 8px; }
    #list-wrap::-webkit-scrollbar-track { background: #1a1a1a; }
    #list-wrap::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    #list-wrap::-webkit-scrollbar-thumb:hover { background: #00e5ff; }

    .brand-label {
      font-size: 0.65rem; letter-spacing: 0.12em; color: #444;
      text-transform: uppercase; padding: 18px 0 6px;
      border-bottom: 1px solid #1a1a1a; margin-bottom: 2px; font-family: monospace;
    }
    .item-row {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 4px; border-bottom: 1px solid #111;
    }
    .item-row:hover { background: #111; }
    .item-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #00e5ff; cursor: pointer; flex-shrink: 0; }
    .item-name { font-size: 0.9rem; color: #f0f0f0; flex: 1; }
    .item-row.oos .item-name { color: #3a3a3a; text-decoration: line-through; }
  </style>
</head>

function getStock() {
  try { return JSON.parse(localStorage.getItem(STOCK_KEY)) || {}; } catch { return {}; }
}
function setStock(s) { localStorage.setItem(STOCK_KEY, JSON.stringify(s)); }

const urlKey = new URLSearchParams(window.location.search).get('key');
if (urlKey === PW) {
  document.getElementById('pw-screen').style.display = 'none';
  document.getElementById('admin-screen').classList.add('visible');
  renderList('');
}
document.getElementById('product-list').addEventListener('change', e => {
  if (e.target.type === 'checkbox') toggle(e.target.dataset.id, e.target.checked);
});

function updateStats() {
  const s = getStock();
  const inStock = PRODUCTS.filter(p => s[p.id] !== false).length;
  document.getElementById('stats').innerHTML = '<span>' + inStock + '</span> / ' + PRODUCTS.length + ' in stock';
}

function renderList(query) {
  const q = query.toLowerCase();
  const s = getStock();
  const filtered = q ? PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q)
  ) : PRODUCTS;

  const byBrand = {};
  filtered.forEach(p => { (byBrand[p.brand] = byBrand[p.brand] || []).push(p); });
  const brands = Object.keys(byBrand).sort();

  document.getElementById('product-list').innerHTML = brands.map(brand =>
    '<div class="brand-label">' + brand + '</div>' +
    byBrand[brand].map(p => {
      const inStock = s[p.id] !== false;
      return '<div class="item-row' + (inStock ? '' : ' oos') + '" id="r-' + p.id + '">' +
        '<input type="checkbox" ' + (inStock ? 'checked' : '') + ' data-id="' + p.id + '">' +
        '<div class="item-name">' + p.name + '</div></div>';
    }).join('')
  ).join('');
  updateStats();
}

function toggle(id, inStock) {
  const s = getStock();
  if (inStock) { delete s[id]; } else { s[id] = false; }
  setStock(s);
  const row = document.getElementById('r-' + id);
  if (row) row.classList.toggle('oos', !inStock);
  updateStats();
}
