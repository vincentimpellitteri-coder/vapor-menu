          let aTitle = displayName;
          for (const b of brandPfx) { if (aTitle.startsWith(b)) { aTitle = aTitle.slice(b.length); break; } }
          aTitle = aTitle.replace(/^Sadboy [A-Z] /, '').replace(/^Sadboy (Happy End |Nola Bar Strawberry |Nola Bar |Nola Berry |Nola |Pumpkin Cookie |Pumpkin |Shamrock Cookie |Shamrock |Unicorn Tears |Unicorn )/, '');
          aTitle = aTitle.replace(/\s*-\s*.+$/, '').trim() || displayName.replace(/\s*-\s*.+$/, '').trim();
          const saltM = sizes.match(/Salt\s+([\d]+ml(?:\s*\/\s*\d+ml)?)(:\s*([\d\s\/mg]+))?/i);
          const subM  = sizes.match(/Sub-Ohm\s+([\d]+ml(?:\s*\/\s*\d+ml)?)(:\s*([\d\s\/mg]+))?/i);
          const aSaltSz  = saltM ? saltM[1].trim() : '';
          const aSaltStr = saltM && saltM[3] ? saltM[3].trim() : '';
          const aSubSz   = subM  ? subM[1].trim()  : '';
          const aSubStr  = subM && subM[3] ? subM[3].trim() : '';
          const fl = (flavor + ' ' + aTitle).toLowerCase();
          const aIce = /polar ice|sub zero|arctic wintergreen/.test(fl) ? 5 :
                       /\bfreeze\b|frost|arctic/.test(fl) ? 4 :
                       /\bice\b|iced|menthol/.test(fl) ? 3 :
                       /\bmint\b|\bcool\b|\bchill\b/.test(fl) ? 2 : 0;
          const aSaltRow = aSaltSz ? `<div style="display:flex;align-items:center;gap:6px;"><span style="font-size:0.78rem;color:#555;">${aSaltSz}</span><span class="menu-item-type type-SALT">Salt Nic</span><span style="font-size:0.82rem;color:#555;">${aSaltStr}</span></div>` : '';
          const aSubRow  = aSubSz  ? `<div style="display:flex;align-items:center;gap:6px;"><span style="font-size:0.78rem;color:#555;">${aSubSz}</span><span class="menu-item-type type-SUB">Sub-Ohm</span><span style="font-size:0.82rem;color:#555;">${aSubStr}</span></div>` : '';
          div.innerHTML = `
            <div style="display:grid;grid-template-columns:160px 1fr 160px;align-items:stretch;gap:20px;margin-bottom:10px;">
              <div style="display:flex;flex-direction:column;">
                ${item.image ? `<img src="images/${item.image}" alt="${aTitle}" style="width:160px;border-radius:6px;object-fit:contain;flex:1;background:#fff;">` : '<div style="width:160px;flex:1;"></div>'}
                ${iceBadge(aIce)}
              </div>
              <div style="text-align:center;">
                <div class="menu-item-name">${aTitle}</div>
                ${flavor ? `<div style="font-size:0.9rem;color:#b8860b;margin-top:6px;">${flavor}</div>` : ''}
              </div>
              <div></div>
            </div>
            <div style="display:grid;grid-template-columns:160px 1fr 160px;align-items:center;margin-top:10px;border-top:1px solid #ddd;padding-top:10px;">
              <div style="text-align:left;"><span style="font-size:0.82rem;color:#555;">70VG/30PG</span></div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">${aSaltRow}${aSubRow}</div>
              <div></div>
            </div>
          `;
        }
        list.appendChild(div);
      });
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) {
      document.getElementById('menu-search').value = params.get('q');
      render();
    }

    document.getElementById('menu-search').addEventListener('input', render);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.dataset.type;
        render();
      });
    });
  </script>

</div>
</body>
</html>
