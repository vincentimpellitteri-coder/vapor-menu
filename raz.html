<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAZ — The Vapor Place</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .back-btn {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #00e5ff;
      border: 1px solid #00e5ff;
      border-radius: 6px;
      padding: 10px 20px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(0,229,255,0.1); }
    .back-bar { margin: 24px 0; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin: 32px 0;
    }
    .product-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, background 0.2s;
    }
    .product-card:hover { border-color: #00e5ff; background: #1e1e1e; }
    .product-card img {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .product-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #f0f0f0;
      margin-bottom: 8px;
    }
    .product-sub { font-size: 0.85rem; color: #888; }
    h1 span { color: #00e5ff; }
  </style>
</head>
<body id="inner-page">
<div style="position:relative;z-index:1;">

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="images/logo.png" alt="The Vapor Place" class="logo-img">
      </a>
      <span class="badge-21">21+</span>
    </div>
        <nav>
      <a href="ejuicefinder.html">E-Juice Finder</a>
      <a href="menu3.html">Sub Ohm &amp; Salt</a>
      <a href="https://tvp.aglots.com" target="_blank">Full Store</a>
    </nav>
  </header>

  <main>
    <div class="back-bar">
      <a href="ejuicefinder.html" class="back-btn">&larr; Back to E-Juice Finder</a>
    </div>

    <h1><span>RAZ</span> Disposables</h1>
    <p style="color:#888;margin-bottom:8px;">Select a product line</p>

    <div class="product-grid">

      <a href="raz-tn9000.html" class="product-card">
        <img src="images/raz-tn9000-hero.jpg" alt="RAZ TN9000">
        <div class="product-name">RAZ TN9000</div>
        <div class="product-sub">9,000 Puffs &nbsp;&middot;&nbsp; Disposable</div>
      </a>

      <a href="raz-ltx25000.html" class="product-card">
        <img src="images/raz-ltx25000-hero.jpg" alt="RAZ LTX25000">
        <div class="product-name">RAZ LTX25000</div>
        <div class="product-sub">25,000 Puffs &nbsp;&middot;&nbsp; Disposable</div>
      </a>

      <a href="raz-rx-vue-50k.html" class="product-card">
        <img src="images/raz-rx-vue-50k-hero.png" alt="RAZ RX VUE 50K">
        <div class="product-name">RAZ RX VUE 50K</div>
        <div class="product-sub">50,000 Puffs &nbsp;&middot;&nbsp; Disposable</div>
      </a>

      <a href="raz-rx50k.html" class="product-card">
        <img src="images/raz-rx50k-hero.webp" alt="RAZ RX 50K">
        <div class="product-name">RAZ RX 50K</div>
        <div class="product-sub">50,000 Puffs &nbsp;&middot;&nbsp; Disposable</div>
      </a>

    </div>
  </main>

</div>
</body>
</html>
