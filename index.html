<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vapor Place — Age Verification</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #f5f5f7 !important;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .age-gate-box {
      background: #ffffff;
      border: 1px solid #d1d1d6;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .age-gate-box img {
      max-width: 200px;
      height: auto;
      margin: 0 auto 32px;
      display: block;
    }
    .age-gate-box h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }
    .age-gate-box p {
      color: #6b7280;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .age-gate-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .btn-yes {
      background: #0284c7;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-yes:hover { background: #0369a1; }
    .btn-no {
      background: transparent;
      color: #6b7280;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      padding: 14px 36px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-no:hover { border-color: #9ca3af; color: #374151; }
    .age-disclaimer {
      color: #9ca3af;
      font-size: 0.75rem;
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="age-gate-box">
    <img src="images/logo.png" alt="The Vapor Place">
    <h1>Are you 21 or older?</h1>
    <p>You must be 21 years of age or older to enter this site.</p>
    <div class="age-gate-btns">
      <button id="btn-yes" class="btn-yes">Yes, I am 21+</button>
      <button id="btn-no" class="btn-no">No</button>
    </div>
    <p class="age-disclaimer">
      By entering you confirm you are of legal age to purchase tobacco and vaping
      products in your jurisdiction.
    </p>
  </div>
  <script>
    const KEY = 'vp_age_verified';
    if (sessionStorage.getItem(KEY)) {
      window.location.replace('ejuicefinder.html');
    }
    document.getElementById('btn-yes').addEventListener('click', function () {
      sessionStorage.setItem(KEY, '1');
      window.location.href = 'ejuicefinder.html';
    });
    document.getElementById('btn-no').addEventListener('click', function () {
      window.location.href = 'https://www.google.com';
    });
  </script>
</body>
</html>
